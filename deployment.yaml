apiVersion: apps/v1
kind: Deployment
metadata:
  name: log-monitor-deployment
spec:
  replicas: 2
  selector:
    matchLabels:
      app: log-monitor
  template:
    metadata:
      labels:
        app: log-monitor
    spec:
      containers:
      - name: log-monitor
        image: itstechutsav/log-monitor
        ports:
        - containerPort: 5000